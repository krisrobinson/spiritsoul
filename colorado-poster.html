document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-display: swap;\n}\n@font-face {\n  font-family: \"Roxborough CF\";\n  src: url(\"577231a2-3524-41e8-bab8-caa540642c6a\") format(\"opentype\");\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Roxborough CF\";\n  src: url(\"57b3152d-9ada-4ada-8b7e-8bb712fee7b9\") format(\"opentype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* ===========================================================================\n   Spirit Soul — Color tokens\n   Calibrated to the brand hero: a soft TWILIGHT world — periwinkle sky,\n   dusty mauve & peach horizon, deep plum framing — lit by golden-hour GOLD\n   (headline gradients) and a SUNSET-TERRACOTTA primary action.\n   Anchored on the brand cream (#f7ebde).\n   =========================================================================== */\n:root {\n  /* ---- Cream / paper (the canvas) -------------------------------------- */\n  --cream-50:  #fdf8f1;\n  --cream-100: #f7ebde;   /* brand canvas — meta theme-color */\n  --cream-200: #efddc9;\n  --cream-300: #e6cdb1;\n  --cream-400: #d9b994;\n\n  /* ---- Ink (warm espresso browns, for text on paper) ------------------- */\n  --ink-900: #2a1e1a;     /* primary text (faint plum-warm) */\n  --ink-700: #483630;\n  --ink-500: #6f5a52;\n  --ink-400: #8d7870;\n  --ink-300: #ab9690;\n\n  /* ---- Sunset / terracotta (PRIMARY ACTION) ---------------------------- */\n  --sunset-200: #f0c3a3;\n  --sunset-300: #e8a07a;\n  --sunset-400: #d97f4f;\n  --sunset-500: #cb6a36;\n  --sunset-600: #c0602e;   /* primary CTA fill */\n  --sunset-700: #a44e22;\n\n  /* ---- Gold / honey (HEADLINE GRADIENTS + accents) --------------------- */\n  --gold-200: #f7e0a8;     /* gradient highlight */\n  --gold-300: #f2cf86;\n  --gold-400: #ecbd63;\n  --gold-500: #e3a948;     /* gold accent */\n  --gold-600: #cf8f30;\n  --gold-700: #ab6f1d;\n  /* legacy aliases (gold === the old \"marigold\") */\n  --marigold-300: var(--gold-300);\n  --marigold-500: var(--gold-500);\n  --marigold-600: var(--gold-600);\n  --marigold-700: var(--gold-700);\n  --marigold-100: #fbeccc;\n\n  /* ---- Dusk / twilight (soft atmospheric tones & gradients) ------------ */\n  --dusk-sky:    #9a9cc4;   /* periwinkle sky */\n  --dusk-haze:   #b6a4c0;   /* lavender haze */\n  --dusk-mauve:  #bd8e9c;   /* dusty rose-mauve */\n  --dusk-rose:   #cc9085;   /* warm rose */\n  --dusk-peach:  #dba884;   /* peach horizon */\n\n  /* ---- Plum / aubergine (deep framing & immersive night) --------------- */\n  --plum-900: #251726;     /* deepest night */\n  --plum-800: #36223a;\n  --plum-700: #4a3050;\n  --plum-600: #5e3f63;\n  --plum-500: #74527a;\n  /* legacy indigo aliases → plum (kept so older refs stay on-brand) */\n  --indigo-950: var(--plum-900);\n  --indigo-900: var(--plum-800);\n  --indigo-800: var(--plum-700);\n  --indigo-600: var(--plum-600);\n\n  /* ---- Midnight (cool blue-navy night — the Tracks / player theme) ----- */\n  --midnight-950: #0b0d1c;   /* deepest player bg */\n  --midnight-900: #11142a;   /* card surface */\n  --midnight-800: #1a1e3a;\n  --midnight-700: #262a4d;\n\n  /* ---- Lotus rose (warm accent) ---------------------------------------- */\n  --rose-200: #f3cfc6;\n  --rose-400: #e2998c;\n  --rose-500: #cf6f5f;\n  --terracotta-600: #b4502f;\n\n  /* ---- Jade (cool \"calm / rest\" accent — used sparingly) --------------- */\n  --jade-300: #9cc4ab;\n  --jade-500: #5d9676;\n  --jade-700: #3c6c54;\n\n  /* ---- Signature gradients --------------------------------------------- */\n  --gradient-gold:   linear-gradient(178deg, var(--gold-200) 6%, var(--gold-500) 62%, var(--gold-600) 100%);\n  /* The official brand gradient — sampled from the logo mark: gold → rose.\n     Used on the colored logo, brand moments, and decorative fills. */\n  --gradient-brand:  linear-gradient(180deg, #fcc961 0%, #f3bd6a 35%, #e6a079 68%, #cf7e8c 100%); /* @kind color */\n  /* metallic gold-LEAF foil — for edging, hairlines, dividers, fine borders.\n     The real print pieces use actual gold-leaf foil; this shimmer stands in\n     for it on screen. Gold is a PRECIOUS METALLIC accent — never flat orange. */\n  --gradient-foil:   linear-gradient(115deg, #a9741f 0%, #f0d385 20%, #c8923a 40%, #f8ecc0 58%, #bd8730 78%, #ecca78 100%); /* @kind color */\n  --gradient-sunset: linear-gradient(135deg, var(--sunset-500), var(--sunset-700));\n  --gradient-terracotta: linear-gradient(176deg, var(--sunset-500) 4%, #7a4327 104%);\n  --gradient-dusk:   linear-gradient(180deg, var(--dusk-sky) 0%, var(--dusk-haze) 30%, var(--dusk-mauve) 52%, var(--dusk-peach) 72%, var(--plum-800) 100%);\n  --gradient-midnight: radial-gradient(120% 80% at 50% 0%, #181c3a 0%, var(--midnight-950) 60%);\n\n  /* ---- Semantic aliases ------------------------------------------------ */\n  --bg-page:        var(--cream-100);\n  --bg-raised:      var(--cream-50);\n  --bg-sunk:        var(--cream-200);\n  --bg-night:       var(--plum-900);\n  --bg-night-soft:  var(--plum-800);\n  --bg-midnight:    var(--midnight-950);   /* Tracks / player surface */\n\n  --surface-card:   var(--cream-50);\n  --surface-warm:   #e8dbc8;   /* warm sand — event cards */\n  --surface-night:  var(--plum-800);\n  --surface-midnight: var(--midnight-900);\n\n  --text-strong:    var(--ink-900);\n  --text-body:      var(--ink-700);\n  --text-muted:     var(--ink-500);\n  --text-faint:     var(--ink-400);\n  --text-on-night:  var(--cream-100);\n  --text-on-night-muted: #cdbcc8;\n\n  --brand:          var(--sunset-600);   /* primary action */\n  --brand-strong:   var(--sunset-700);\n  --brand-soft:     #f6e0d0;\n  --gold:           var(--gold-500);      /* headline / decorative gold */\n  --accent:         var(--rose-500);\n  --accent-soft:    var(--rose-200);\n  --calm:           var(--jade-500);\n\n  --border-hair:    color-mix(in srgb, var(--ink-900) 12%, transparent);\n  --border-soft:    color-mix(in srgb, var(--ink-900) 18%, transparent);\n  --border-strong:  color-mix(in srgb, var(--ink-900) 30%, transparent);\n  --border-on-night: color-mix(in srgb, var(--cream-100) 18%, transparent);\n\n  --focus-ring:     color-mix(in srgb, var(--sunset-500) 55%, transparent);\n}\n\n/* ===========================================================================\n   Spirit Soul — Typography tokens\n   Display = Roxborough CF (high-contrast serif). Text = Craketest.\n   =========================================================================== */\n:root {\n  /* ---- Families -------------------------------------------------------- */\n  --font-display: \"Roxborough CF\", \"Cormorant Garamond\", Georgia, serif;\n  /* Body workhorse — readable at all sizes. (Hanken Grotesk substitute.) */\n  --font-body:    \"Hanken Grotesk\", \"Inter\", system-ui, -apple-system, sans-serif;\n  /* Back-compat alias: --font-text now points at the readable body font. */\n  --font-text:    var(--font-body);\n  /* Accent / decorative sans (eyebrows, special labels). */\n  --font-accent:  \"Craketest\", \"Questrial\", \"Avenir Next\", system-ui, sans-serif;\n\n  /* ---- Weights --------------------------------------------------------- */\n  --fw-light: 300;      /* @kind font */\n  --fw-regular: 400;    /* @kind font */\n  --fw-medium: 500;     /* @kind font */\n  --fw-semibold: 600;   /* @kind font */\n  --fw-bold: 700;       /* @kind font */\n\n  /* ---- Fluid type scale (1.250 major-third-ish, warm editorial) -------- */\n  --text-xs:   0.75rem;    /* 12 */\n  --text-sm:   0.875rem;   /* 14 */\n  --text-base: 1rem;       /* 16 */\n  --text-md:   1.125rem;   /* 18 */\n  --text-lg:   1.375rem;   /* 22 */\n  --text-xl:   1.75rem;    /* 28 */\n  --display-sm: clamp(2rem, 1.4rem + 2.4vw, 2.75rem);   /* @kind other */\n  --display-md: clamp(2.75rem, 1.8rem + 3.6vw, 4rem);   /* @kind other */\n  --display-lg: clamp(3.5rem, 2rem + 6vw, 6rem);        /* @kind other */\n  --display-xl: clamp(4.5rem, 2rem + 9vw, 8.5rem);      /* @kind other */\n\n  /* ---- Line heights ---------------------------------------------------- */\n  --leading-tight: 1.04;     /* @kind other */\n  --leading-snug: 1.18;      /* @kind other */\n  --leading-normal: 1.5;     /* @kind other */\n  --leading-relaxed: 1.65;   /* @kind other */\n\n  /* ---- Letter spacing -------------------------------------------------- */\n  --tracking-tight: -0.02em;  /* @kind other */\n  --tracking-normal: 0;       /* @kind other */\n  --tracking-wide: 0.04em;    /* @kind other */\n  --tracking-label: 0.2em;    /* @kind other */\n}\n\n/* ===========================================================================\n   Spirit Soul — Spacing, radii, shadows, motion\n   =========================================================================== */\n:root {\n  /* ---- Spacing scale (4px base) ---------------------------------------- */\n  --space-1: 0.25rem;   /* 4  */\n  --space-2: 0.5rem;    /* 8  */\n  --space-3: 0.75rem;   /* 12 */\n  --space-4: 1rem;      /* 16 */\n  --space-5: 1.5rem;    /* 24 */\n  --space-6: 2rem;      /* 32 */\n  --space-7: 3rem;      /* 48 */\n  --space-8: 4rem;      /* 64 */\n  --space-9: 6rem;      /* 96 */\n  --space-10: 8rem;     /* 128 */\n\n  /* ---- Radii (soft, generous — petals not boxes) ----------------------- */\n  --radius-xs: 6px;\n  --radius-sm: 10px;\n  --radius-md: 16px;\n  --radius-lg: 24px;\n  --radius-xl: 36px;\n  --radius-pill: 999px;\n  --radius-circle: 50%;\n\n  /* ---- Shadows (warm, low, diffuse — candlelit not harsh) -------------- */\n  --shadow-xs: 0 1px 2px color-mix(in srgb, var(--ink-900) 8%, transparent);\n  --shadow-sm: 0 2px 8px color-mix(in srgb, var(--ink-900) 9%, transparent);\n  --shadow-md: 0 10px 28px -8px color-mix(in srgb, var(--ink-900) 18%, transparent);\n  --shadow-lg: 0 24px 60px -16px color-mix(in srgb, var(--ink-900) 26%, transparent);\n  --shadow-glow: 0 0 48px -6px color-mix(in srgb, var(--marigold-500) 55%, transparent);\n\n  /* ---- Motion (gentle, breathing — never snappy/bouncy) ---------------- */\n  --ease-soft: cubic-bezier(0.22, 0.61, 0.36, 1);   /* @kind other */\n  --ease-inout: cubic-bezier(0.65, 0.05, 0.36, 1);  /* @kind other */\n  --dur-fast: 160ms;       /* @kind other */\n  --dur-base: 280ms;       /* @kind other */\n  --dur-slow: 560ms;       /* @kind other */\n  --dur-breathe: 4200ms;   /* @kind other */\n\n  /* ---- Layout ---------------------------------------------------------- */\n  --maxw-prose: 42rem;     /* @kind other */\n  --maxw-content: 68rem;   /* @kind other */\n  --maxw-wide: 84rem;      /* @kind other */\n}\n\n/* ===========================================================================\n   Spirit Soul — base resets & primitives (imported via styles.css)\n   =========================================================================== */\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  background: var(--bg-page);\n  color: var(--text-body);\n  font-family: var(--font-text);\n  font-weight: var(--fw-regular);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  font-weight: var(--fw-semibold);\n  line-height: var(--leading-tight);\n  margin: 0;\n  text-wrap: balance;\n}\n\np { text-wrap: pretty; }\n\na { color: inherit; text-decoration: none; }\n\n::selection { background: var(--marigold-300); color: var(--ink-900); }\n\n/* Button interaction states (used by the Button component) ---------------- */\n.ss-btn:not(:disabled):hover { transform: translateY(-1px); }\n.ss-btn:not(:disabled):active { transform: translateY(0) scale(0.985); }\n.ss-btn--primary:not(:disabled):hover { background: var(--brand-strong); box-shadow: var(--shadow-md); }\n.ss-btn--secondary:not(:disabled):hover { border-color: var(--ink-900); background: color-mix(in srgb, var(--ink-900) 5%, transparent); }\n.ss-btn--ghost:not(:disabled):hover { color: var(--brand-strong); }\n.ss-btn--onNight:not(:disabled):hover { background: #fff; box-shadow: var(--shadow-lg); }\n.ss-btn--goldOutline:not(:disabled):hover { border-color: var(--gold-600); background: var(--cream-100); }\n.ss-btn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }\n\n/* IconButton interaction states */\n.ss-iconbtn:hover { transform: translateY(-1px); }\n.ss-iconbtn:active { transform: scale(0.94); }\n.ss-iconbtn--soft:hover { background: var(--cream-300); }\n.ss-iconbtn--solid:hover { background: var(--brand-strong); }\n.ss-iconbtn--outline:hover { border-color: var(--ink-900); }\n.ss-iconbtn--onNight:hover { background: color-mix(in srgb, var(--cream-100) 22%, transparent); }\n.ss-iconbtn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }\n\n/* Input focus states */\n.ss-input::placeholder { color: var(--text-faint); }\n.ss-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--focus-ring); }\n\n/* Uppercase tracked text-link (e.g. \"ALL EVENTS →\") ------------------------ */\n.ss-link {\n  font-family: var(--font-body);\n  font-size: var(--text-sm);\n  font-weight: 600;\n  letter-spacing: var(--tracking-wide);\n  text-transform: uppercase;\n  cursor: pointer;\n  transition: opacity var(--dur-fast) var(--ease-soft);\n}\n.ss-link:hover { opacity: 0.65; }\n\n/* Eyebrow / label utility used across the brand */\n.ss-eyebrow {\n  font-family: var(--font-text);\n  font-size: var(--text-xs);\n  font-weight: var(--fw-medium);\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n/* Signature gold-gradient text (headlines / wordmark) ---------------------- */\n.ss-gold-text {\n  background: var(--gradient-gold);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n}\n\n/* Terracotta-gradient text (section titles on paper) ----------------------- */\n.ss-terracotta-text {\n  background: var(--gradient-terracotta);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n}\n\n/* Gold-leaf foil edging — mimics the printed gold-leaf border on the cards. */\n.ss-foil-edge {\n  border: 2px solid transparent;\n  background:\n    linear-gradient(var(--foil-fill, var(--cream-50)), var(--foil-fill, var(--cream-50))) padding-box,\n    var(--gradient-foil) border-box;\n}\n.ss-foil-rule {\n  height: 2px;\n  border: 0;\n  background: var(--gradient-foil);\n}\n\n<\u002Fstyle>\n<style>\n  html, body { margin: 0; height: 100%; }\n  body { background: #0b0a14; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; box-sizing: border-box; }\n  .stage { width: 1080px; height: 1440px; transform-origin: center; }\n\n  .poster { position: relative; width: 1080px; height: 1440px; overflow: hidden;\n    background: var(--midnight-950); font-family: var(--font-body); color: var(--cream-100);\n    box-shadow: 0 40px 120px -20px rgba(0,0,0,0.7); }\n\n  /* full-bleed hero photo */\n  .bg { position: absolute; inset: 0; }\n  .bg img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }\n  /* dramatic wash: clear at top, deep plum→midnight to anchor the type */\n  .wash { position: absolute; inset: 0;\n    background:\n      linear-gradient(180deg, rgba(11,10,20,0.55) 0%, rgba(11,10,20,0.05) 22%, rgba(11,10,20,0.05) 40%, rgba(20,12,32,0.72) 62%, var(--midnight-950) 90%);\n  }\n  .wash2 { position: absolute; inset: 0; mix-blend-mode: soft-light;\n    background: radial-gradient(80% 50% at 50% 8%, color-mix(in srgb, var(--gold-400) 30%, transparent), transparent 70%); }\n\n  .inner { position: absolute; inset: 0; z-index: 3; display: flex; flex-direction: column; align-items: center;\n    padding: 60px 80px 60px; box-sizing: border-box; }\n\n  /* top masthead */\n  .mast { display: flex; flex-direction: column; align-items: center; gap: 16px; }\n  .wordmark { height: 40px; filter: drop-shadow(0 2px 16px rgba(0,0,0,0.7)); }\n  .kicker { font-family: var(--font-body); font-weight: 600; font-size: 18px; letter-spacing: 0.42em; text-transform: uppercase;\n    color: var(--gold-300); text-shadow: 0 2px 14px rgba(0,0,0,0.8); padding-left: 0.42em; }\n\n  /* hero title block — bottom-anchored */\n  .hero { margin-top: auto; display: flex; flex-direction: column; align-items: center; text-align: center; }\n  .title { font-family: var(--font-accent); font-weight: 700; font-size: 132px; line-height: 0.9; margin: 0; padding-bottom: 0.3em;\n    background: linear-gradient(168deg, #fdeec2 0%, var(--gold-300) 30%, var(--gold-500) 64%, var(--gold-700) 100%);\n    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;\n    filter: drop-shadow(0 4px 22px rgba(0,0,0,0.6)); letter-spacing: -0.03em; }\n  .tagline { font-family: var(--font-display); font-style: italic; font-weight: 400; font-size: 33px;\n    color: var(--cream-100); margin: 22px 0 0; text-shadow: 0 2px 16px rgba(0,0,0,0.85); }\n\n  /* dates strip */\n  .strip { margin-top: 40px; width: 100%; display: flex; align-items: stretch; justify-content: center; }\n  .stop { flex: 1; text-align: center; padding: 0 14px; position: relative; }\n  .stop + .stop::before { content: \"\"; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;\n    background: var(--gradient-foil); opacity: 0.55; }\n  .stop .city { display: block; font-family: var(--font-display); font-weight: 600; font-size: 30px; line-height: 1.04;\n    color: var(--cream-50); min-height: 64px; display: flex; align-items: flex-end; justify-content: center;\n    text-shadow: 0 1px 12px rgba(0,0,0,0.9); }\n  .stop .when { display: block; font-family: var(--font-body); font-weight: 700; font-size: 19px; letter-spacing: 0.06em;\n    color: var(--gold-300); margin-top: 10px; text-shadow: 0 1px 10px rgba(0,0,0,0.95); }\n\n  /* footer cta */\n  .foot { margin-top: 44px; display: flex; flex-direction: column; align-items: center; gap: 15px; }\n  .pill { font-family: var(--font-body); font-weight: 600; font-size: 27px; color: var(--cream-50);\n    background: var(--sunset-600); padding: 18px 50px; border-radius: var(--radius-pill); box-shadow: 0 14px 40px -10px rgba(0,0,0,0.6); }\n  .url { font-family: var(--font-body); font-size: 20px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--cream-100);\n    text-shadow: 0 1px 10px rgba(0,0,0,0.9); }\n  .fine { font-family: var(--font-body); font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-on-night-muted); }\n\n  /* QR — top right */\n  .qr { position: absolute; right: 56px; top: 56px; z-index: 4; display: flex; flex-direction: column; align-items: center; gap: 11px; }\n  .qr .tile { width: 150px; height: 150px; padding: 11px; border-radius: var(--radius-md); background: var(--cream-50);\n    border: 2px solid transparent; background-clip: padding-box;\n    box-shadow: 0 12px 34px -10px rgba(0,0,0,0.6), 0 0 0 2px color-mix(in srgb, var(--gold-400) 70%, transparent); box-sizing: border-box; }\n  .qr .tile img { width: 100%; height: 100%; display: block; }\n  .qr .cap { font-family: var(--font-body); font-weight: 600; font-size: 14px; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--gold-300); text-shadow: 0 1px 10px rgba(0,0,0,0.9); padding-left: 0.22em; }\n  .qr .tile { width: 132px; height: 132px; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"stage\" id=\"stage\">\n  <div class=\"poster\">\n    <div class=\"bg\"><img src=\"52c19d30-9f1e-4679-a28d-93b0b685b395\" alt=\"\"><\u002Fdiv>\n    <div class=\"wash\"><\u002Fdiv>\n    <div class=\"wash2\"><\u002Fdiv>\n\n    <div class=\"qr\">\n      <div class=\"tile\"><img src=\"175a634f-76de-4c86-80a9-395c23200738\" alt=\"QR code linking to spiritsoul.com/colorado\"><\u002Fdiv>\n      <span class=\"cap\">Scan for details<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"inner\">\n      <div class=\"mast\">\n        <img class=\"wordmark\" src=\"6a7a3113-c784-46ba-95cb-fa3cd95cd907\" alt=\"Spirit Soul\">\n        <span class=\"kicker\">Colorado · Summer 2026<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"hero\">\n        <h1 class=\"title\">The Kirtan<br>Experience<\u002Fh1>\n        <p class=\"tagline\">A joyful immersion in mantra, music &amp; dance<\u002Fp>\n\n        <div class=\"strip\">\n          <div class=\"stop\"><span class=\"city\">Fort Collins<\u002Fspan><span class=\"when\">JUL 10 &amp; 11<\u002Fspan><\u002Fdiv>\n          <div class=\"stop\"><span class=\"city\">Boulder<\u002Fspan><span class=\"when\">JUL 17 &amp; 18<\u002Fspan><\u002Fdiv>\n          <div class=\"stop\"><span class=\"city\">Colorado Springs<\u002Fspan><span class=\"when\">JUL 25 &amp; 26<\u002Fspan><\u002Fdiv>\n          <div class=\"stop\"><span class=\"city\">Denver<\u002Fspan><span class=\"when\">AUG 1 &amp; 2<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"foot\">\n          <span class=\"pill\">Reserve your free spot<\u002Fspan>\n          <span class=\"url\">spiritsoul.com/colorado<\u002Fspan>\n          <span class=\"fine\">Free admission · Donations welcome<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<script>\n  function fit() {\n    const stage = document.getElementById('stage');\n    const s = Math.min((window.innerWidth - 48) / 1080, (window.innerHeight - 48) / 1440, 1);\n    stage.style.transform = 'scale(' + s + ')';\n  }\n  window.addEventListener('resize', fit); fit();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
